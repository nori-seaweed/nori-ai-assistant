services:
  - type: web
    name: nori-ai-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: YOUTUBE_PRIVACY
        value: public
      - key: BRAND_GENRE
        value: Lo-fi Hip Hop, Chillhop
      - key: BRAND_BPM
        value: 70-85
      - key: BRAND_MOOD
        value: calm, emotional, nostalgic, focus-friendly
      - key: BRAND_INSTRUMENTS
        value: soft piano, mellow drums, vinyl crackle, ambient pads, jazzy guitar
      - key: BRAND_VOCAL
        value: female vocal, 30s, soft
      - key: JOB_DB_PATH
        value: /tmp/nori_jobs.db
      - key: VIDEO_DIR
        value: /tmp/nori_videos
      - key: AUDIO_DIR
        value: /tmp/nori_audio
      - key: THUMB_DIR
        value: /tmp/nori_thumbs
